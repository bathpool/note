<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes Taking App</title>
    <link rel="manifest" href="/site.webmanifest">
    <!-- Force the Home Screen icon to open in real Safari, not a standalone
         web view. Google's OAuth policy blocks sign-in from embedded/standalone
         web views, so standalone mode breaks Google login on iOS. -->
    <meta name="apple-mobile-web-app-capable" content="no">
    <meta name="mobile-web-app-capable" content="no">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-container">
        <div id="auth-prompt">
            <h2>Notes App</h2>
            <p>Sign in to access your notes</p>
            <div id="gsi-button"></div>
            <p id="auth-error"></p>
        </div>
    </div>
    <div id="app-container" style="display: none;">
        <div id="toolbar">
            <button id="addBtn">
                <i class="fas fa-plus"></i>
                Add Note
            </button>
            <div id="user-info">
                <span id="user-email"></span>
                <button id="signOutBtn">Sign Out</button>
            </div>
        </div>
        <div id="main"></div>
    </div>
    <script src="https://kit.fontawesome.com/bf520e6492.js" crossorigin="anonymous"></script>
    <script src="https://accounts.google.com/gsi/client" async></script>
    <script type="module" src="Notes_app.js"></script>
</body>
</html>
